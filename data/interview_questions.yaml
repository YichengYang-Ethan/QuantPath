categories:
  - id: probability
    name: "Probability & Statistics"
    questions:
      - question: "You flip a fair coin until you get two heads in a row. What is the expected number of flips?"
        difficulty: medium
        topics: ["expected_value", "markov_chains"]
        hint: "Set up a system of equations using states: Start, one Head seen."
        solution: |
          6 flips. Define states: S (start/just got tails), H (just got one head).
          E[S] = 1 + 0.5*E[H] + 0.5*E[S]
          E[H] = 1 + 0.5*0 + 0.5*E[S]
          Substituting: E[S] = 6.
        programs: ["baruch-mfe", "cmu-mscf"]

      - question: "A stick is broken at two uniformly random points. What is the probability the three pieces form a triangle?"
        difficulty: hard
        topics: ["geometric_probability", "uniform_distribution"]
        hint: "Use the triangle inequality: each piece must be less than 1/2 the total length."
        solution: |
          1/4. Let the break points be U, V ~ Uniform(0,1). The three pieces satisfy the
          triangle inequality iff none exceeds 1/2. By geometric probability (area of the
          valid region inside the unit square), the answer is 1/4.
        programs: ["princeton-mfin", "stanford-mcf"]

      - question: "You have a biased coin with P(H) = p. How do you use it to simulate a fair coin?"
        difficulty: easy
        topics: ["simulation", "von_neumann_trick"]
        hint: "Consider pairs of flips and the symmetry between HT and TH."
        solution: |
          Von Neumann's trick: Flip twice. If HT, call it 'Heads'. If TH, call it 'Tails'.
          If HH or TT, discard and repeat. P(HT) = p(1-p) = P(TH), so outcomes are equally likely.
        programs: ["baruch-mfe", "mit-mfin"]

      - question: "Two envelopes each contain a check. One check is twice the other. You pick one and see $100. Should you switch?"
        difficulty: medium
        topics: ["expected_value", "paradoxes"]
        hint: "Think carefully about the prior distribution over possible amounts."
        solution: |
          The naive argument says switching gives E = 0.5*200 + 0.5*50 = 125 > 100, so switch.
          But this is a paradox -- the same argument applies regardless of the amount seen.
          Without a prior on the amounts, you cannot determine if switching is beneficial.
          With a proper Bayesian prior, the answer depends on the prior distribution.
        programs: ["cmu-mscf", "uchicago-msfm"]

      - question: "What is the expected number of rolls of a fair die to see all 6 faces?"
        difficulty: medium
        topics: ["coupon_collector", "expected_value"]
        hint: "Use the coupon collector framework: after seeing k faces, how many rolls to see a new one?"
        solution: |
          14.7 rolls. After seeing k distinct faces, the probability of a new face is (6-k)/6,
          so the expected rolls to get the next new face is 6/(6-k).
          Total = 6/6 + 6/5 + 6/4 + 6/3 + 6/2 + 6/1 = 1 + 1.2 + 1.5 + 2 + 3 + 6 = 14.7.
        programs: ["baruch-mfe", "nyu-tandon-mfe"]

      - question: "You draw cards from a standard 52-card deck without replacement. What is the expected number of draws until you get an Ace?"
        difficulty: medium
        topics: ["expected_value", "hypergeometric"]
        hint: "Think of the 4 Aces as dividing the non-Ace cards into 5 groups."
        solution: |
          10.6 draws. By symmetry, the 4 Aces divide the 48 non-Ace cards into 5 equally-sized
          groups in expectation. The expected size of the first group (before the first Ace) is
          48/5 = 9.6. So the expected draws until the first Ace is 9.6 + 1 = 10.6.
        programs: ["columbia-msfe", "baruch-mfe"]

      - question: "If X and Y are independent standard normals, what is the distribution of X^2 + Y^2?"
        difficulty: easy
        topics: ["chi_squared", "normal_distribution"]
        hint: "Recall the definition of the chi-squared distribution."
        solution: |
          X^2 + Y^2 ~ Chi-squared(2) = Exponential(1/2). The sum of squares of k independent
          standard normals follows a chi-squared distribution with k degrees of freedom.
          Chi-squared(2) is equivalent to Exponential with rate 1/2 (mean 2).
        programs: ["cmu-mscf", "princeton-mfin"]

      - question: "You toss a fair coin 100 times. What is the probability of getting exactly 50 heads? Approximate."
        difficulty: medium
        topics: ["central_limit_theorem", "binomial"]
        hint: "Use the normal approximation to the binomial (de Moivre-Laplace)."
        solution: |
          Approximately 0.08 (about 8%). Using the normal approximation, X ~ Bin(100, 0.5) is
          approximately N(50, 25). P(X=50) ~ f(50) * 1 = (1/sqrt(2*pi*25)) * 1 = 1/(5*sqrt(2*pi))
          ~ 0.0798.
        programs: ["baruch-mfe", "berkeley-mfe"]

      - question: "A and B alternately toss a fair coin (A first). The first to get heads wins. What is A's probability of winning?"
        difficulty: easy
        topics: ["geometric_series", "probability"]
        hint: "A wins on toss 1, 3, 5, ... Sum the geometric series."
        solution: |
          2/3. P(A wins) = 1/2 + (1/2)^2 * 1/2 + (1/2)^4 * 1/2 + ...
          = (1/2) * sum_{k=0}^{inf} (1/4)^k = (1/2) * 1/(1 - 1/4) = (1/2)*(4/3) = 2/3.
        programs: ["nyu-tandon-mfe", "ucla-mfe"]

      - question: "You have 3 cards: one red on both sides, one blue on both sides, one red on one side and blue on the other. You draw a card and see a red side. What is the probability the other side is also red?"
        difficulty: medium
        topics: ["bayes_theorem", "conditional_probability"]
        hint: "Count the number of red sides, not the number of cards."
        solution: |
          2/3. There are 3 red sides total. 2 of them belong to the red-red card (so the other
          side is red). 1 belongs to the red-blue card (so the other side is blue).
          P(other side red | see red) = 2/3.
        programs: ["baruch-mfe", "cmu-mscf", "mit-mfin"]

      - question: "A disease affects 1 in 10,000 people. A test for the disease has a 99% true positive rate and a 1% false positive rate. If a person tests positive, what is the probability they have the disease?"
        difficulty: medium
        topics: ["bayes_theorem", "conditional_probability"]
        hint: "Apply Bayes' theorem. The low base rate matters enormously."
        solution: |
          About 0.98%. By Bayes' theorem:
          P(D|+) = P(+|D)*P(D) / [P(+|D)*P(D) + P(+|~D)*P(~D)]
          = 0.99 * 0.0001 / (0.99 * 0.0001 + 0.01 * 0.9999)
          = 0.000099 / (0.000099 + 0.009999) ~ 0.0098 or about 1%.
          This illustrates the base rate fallacy -- even with a good test, rare diseases
          yield mostly false positives.
        programs: ["baruch-mfe", "cmu-mscf"]

      - question: "In a room of 23 people, what is the probability that at least two share a birthday? Assume 365 days."
        difficulty: easy
        topics: ["birthday_problem", "combinatorics"]
        hint: "Compute the complement: probability that ALL 23 people have distinct birthdays."
        solution: |
          About 50.7%. P(at least one match) = 1 - P(all distinct).
          P(all distinct) = (365/365) * (364/365) * (363/365) * ... * (343/365)
          = 365! / (365^23 * 342!) ~ 0.4927.
          So P(match) ~ 1 - 0.4927 = 0.5073.
          The result is surprisingly high because there are C(23,2) = 253 pairs to compare.
        programs: ["baruch-mfe", "nyu-tandon-mfe"]

      - question: "You are on a game show with 3 doors. Behind one is a car; behind the others, goats. You pick door 1. The host (who knows what's behind the doors) opens door 3 to reveal a goat. Should you switch to door 2?"
        difficulty: easy
        topics: ["monty_hall", "conditional_probability"]
        hint: "Consider the host's information. How does the host's action update the probabilities?"
        solution: |
          Yes, switch. Switching wins with probability 2/3, staying wins with probability 1/3.
          Initially, P(car behind door 1) = 1/3, P(car behind doors 2 or 3) = 2/3.
          The host always reveals a goat from the unchosen doors. After the host opens door 3
          (a goat), the 2/3 probability concentrates entirely on door 2.
          The key insight: the host's action provides information because the host never opens
          the door with the car.
        programs: ["baruch-mfe", "nyu-tandon-mfe", "uchicago-msfm"]

      - question: "A drunk man starts at position 0 on the integer line. Each step he goes +1 or -1 with equal probability. What is the probability he eventually returns to 0?"
        difficulty: medium
        topics: ["random_walk", "recurrence"]
        hint: "This is a classic result about recurrence of random walks. Consider the dimension."
        solution: |
          Probability 1 (certain return). The symmetric random walk in 1D is recurrent --
          it visits every integer (including the origin) infinitely often with probability 1.
          This follows from the fact that sum of P(S_{2n}=0) diverges: P(S_{2n}=0) = C(2n,n)/2^{2n}
          ~ 1/sqrt(pi*n) by Stirling, and sum 1/sqrt(n) diverges.
          Note: in 2D the walk is also recurrent (Polya), but in 3D and higher, it is transient.
        programs: ["princeton-mfin", "cmu-mscf"]

      - question: "Let X ~ Exponential(lambda). What is E[X | X > t]?"
        difficulty: medium
        topics: ["conditional_expectation", "memoryless_property"]
        hint: "The exponential distribution has the memoryless property."
        solution: |
          E[X | X > t] = t + 1/lambda.
          By the memoryless property, given X > t, the remaining lifetime X - t is still
          Exponential(lambda). So E[X - t | X > t] = 1/lambda, and E[X | X > t] = t + 1/lambda.
          This property uniquely characterizes the exponential among continuous distributions
          and is essential in queueing theory and financial modeling of default times.
        programs: ["baruch-mfe", "columbia-msfe"]

      - question: "You have n independent Uniform(0,1) random variables. What is the expected value of the maximum?"
        difficulty: hard
        topics: ["order_statistics", "expected_value"]
        hint: "Find the CDF of the maximum, then compute the expectation."
        solution: |
          E[max] = n/(n+1).
          Let M = max(X_1,...,X_n). The CDF is P(M <= x) = x^n for 0 <= x <= 1.
          The PDF is f_M(x) = n*x^{n-1}.
          E[M] = integral_0^1 x * n * x^{n-1} dx = n * integral_0^1 x^n dx = n/(n+1).
          For n=1: E[max] = 1/2 (just a single uniform). For n=10: E[max] = 10/11 ~ 0.909.
        programs: ["princeton-mfin", "stanford-mcf"]

      - question: "What is a moment generating function (MGF)? Compute the MGF of a standard normal distribution."
        difficulty: medium
        topics: ["moment_generating_function", "normal_distribution"]
        hint: "The MGF is E[e^{tX}]. For the normal, complete the square in the exponent."
        solution: |
          The MGF is M_X(t) = E[e^{tX}]. It uniquely determines the distribution (when it exists)
          and the k-th moment is M^{(k)}(0) = E[X^k].
          For Z ~ N(0,1): M_Z(t) = E[e^{tZ}] = integral e^{tz} * (1/sqrt(2*pi)) * e^{-z^2/2} dz.
          Complete the square: tz - z^2/2 = -(z-t)^2/2 + t^2/2.
          So M_Z(t) = e^{t^2/2} * integral (1/sqrt(2*pi)) * e^{-(z-t)^2/2} dz = e^{t^2/2}.
        programs: ["baruch-mfe", "cmu-mscf", "berkeley-mfe"]

      - question: "In a Poisson process with rate lambda, given that exactly one event occurred in [0, 1], what is the distribution of the event time?"
        difficulty: medium
        topics: ["poisson_process", "conditional_distribution"]
        hint: "Think about the uniform order statistic property of the Poisson process."
        solution: |
          Uniform(0, 1). Given N(1) = 1 in a Poisson process with rate lambda, the single
          arrival time is uniformly distributed on [0, 1]. More generally, given N(t) = n,
          the n arrival times have the same distribution as n independent Uniform(0, t)
          random variables sorted. This is the uniform order statistic property of the
          Poisson process and is fundamental to simulation and thinning algorithms.
        programs: ["columbia-msfe", "princeton-mfin"]

      - question: "You shuffle a standard 52-card deck. What is the expected number of fixed points (cards that remain in their original position)?"
        difficulty: medium
        topics: ["expected_value", "indicator_variables", "derangement"]
        hint: "Use indicator random variables. Let X_i = 1 if card i is in position i."
        solution: |
          E[fixed points] = 1. Let X_i = 1 if card i is in its original position.
          E[X_i] = 1/52 for each i (card i is equally likely to be in any position).
          By linearity of expectation: E[sum X_i] = sum E[X_i] = 52 * (1/52) = 1.
          Remarkably, this equals 1 regardless of the deck size n (always n * 1/n = 1).
          The variance is also 1. The number of fixed points is approximately Poisson(1)
          for large n. The probability of zero fixed points (derangement) is ~1/e ~ 36.8%.
        programs: ["baruch-mfe", "cmu-mscf"]

      - question: "A box contains 5 red balls and 3 blue balls. You draw 3 balls without replacement. What is the probability of getting exactly 2 red balls?"
        difficulty: easy
        topics: ["hypergeometric", "combinatorics"]
        hint: "This is a hypergeometric distribution problem. Choose 2 red from 5 and 1 blue from 3."
        solution: |
          P(2 red, 1 blue) = C(5,2) * C(3,1) / C(8,3) = 10 * 3 / 56 = 30/56 = 15/28 ~ 0.536.
          This is the hypergeometric distribution: sampling without replacement from a finite
          population. Parameters: N=8 total, K=5 red, n=3 drawn.
          Key difference from binomial: no replacement means draws are not independent.
          For large N relative to n, the hypergeometric approximates the binomial.
        programs: ["baruch-mfe", "nyu-tandon-mfe"]

  - id: stochastic_calculus
    name: "Stochastic Calculus"
    questions:
      - question: "State Ito's Lemma for a function f(t, X_t) where X_t follows dX_t = mu*dt + sigma*dW_t."
        difficulty: easy
        topics: ["itos_lemma", "stochastic_differential_equations"]
        hint: "Remember the extra second-order term from the quadratic variation of Brownian motion."
        solution: |
          df = (df/dt + mu * df/dx + 0.5 * sigma^2 * d^2f/dx^2) dt + sigma * df/dx * dW_t.
          The key difference from ordinary calculus is the (1/2)*sigma^2*f_xx term, which arises
          because (dW_t)^2 = dt in the Ito calculus framework.
        programs: ["baruch-mfe", "princeton-mfin", "cmu-mscf"]

      - question: "Let W_t be a standard Brownian motion. Compute d(W_t^2) using Ito's Lemma."
        difficulty: easy
        topics: ["itos_lemma", "brownian_motion"]
        hint: "Apply Ito's Lemma with f(x) = x^2, dX = dW."
        solution: |
          d(W_t^2) = 2*W_t * dW_t + (1/2)*2*dt = 2*W_t * dW_t + dt.
          Here f(x) = x^2, f'(x) = 2x, f''(x) = 2, mu = 0, sigma = 1.
          Equivalently: W_t^2 = 2 * integral_0^t W_s dW_s + t.
        programs: ["baruch-mfe", "berkeley-mfe"]

      - question: "Derive the Black-Scholes PDE for a European call option."
        difficulty: hard
        topics: ["black_scholes", "risk_neutral_pricing", "pde"]
        hint: "Form a self-financing portfolio of the option and Delta shares of stock to eliminate risk."
        solution: |
          Under GBM dS = mu*S*dt + sigma*S*dW, apply Ito's Lemma to V(S,t):
          dV = (V_t + mu*S*V_S + 0.5*sigma^2*S^2*V_SS)dt + sigma*S*V_S*dW.
          Hedge: Pi = V - Delta*S with Delta = V_S eliminates dW.
          No-arbitrage: dPi = r*Pi*dt gives the BS PDE:
          V_t + 0.5*sigma^2*S^2*V_SS + r*S*V_S - r*V = 0.
        programs: ["baruch-mfe", "princeton-mfin", "cmu-mscf", "stanford-mcf"]

      - question: "What is the Girsanov theorem and why is it important in finance?"
        difficulty: hard
        topics: ["girsanov", "measure_change", "risk_neutral"]
        hint: "It tells us how to change the drift of a Brownian motion when switching probability measures."
        solution: |
          Girsanov's theorem states that if we define a new measure Q via the Radon-Nikodym
          derivative dQ/dP = exp(-theta*W_T - 0.5*theta^2*T), then W_t^Q = W_t + theta*t is
          a Brownian motion under Q. In finance, this lets us switch from the real-world measure P
          (with drift mu) to the risk-neutral measure Q (with drift r), enabling us to price
          derivatives as discounted expected payoffs under Q.
        programs: ["princeton-mfin", "stanford-mcf", "mit-mfin"]

      - question: "If S_t follows geometric Brownian motion dS/S = mu*dt + sigma*dW, what is E[S_t]?"
        difficulty: medium
        topics: ["geometric_brownian_motion", "expected_value"]
        hint: "Solve the SDE explicitly using Ito's Lemma on ln(S_t)."
        solution: |
          E[S_t] = S_0 * exp(mu * t).
          Applying Ito's Lemma to ln(S_t): d(ln S) = (mu - sigma^2/2)dt + sigma*dW.
          So S_t = S_0 * exp((mu - sigma^2/2)*t + sigma*W_t).
          Taking expectations: E[S_t] = S_0 * exp((mu - sigma^2/2)*t) * exp(sigma^2*t/2) = S_0 * exp(mu*t).
        programs: ["baruch-mfe", "cmu-mscf", "columbia-msfe"]

      - question: "Is the Ito integral integral_0^T W_t dW_t a martingale? What is its expectation?"
        difficulty: medium
        topics: ["ito_integral", "martingale"]
        hint: "Ito integrals with nice integrands are martingales. Use the result for d(W_t^2)."
        solution: |
          Yes, it is a martingale (since W_t is adapted and E[integral W^2 dt] < inf).
          Its expectation is 0. We can also compute it directly:
          integral_0^T W_t dW_t = (W_T^2 - T)/2.
          E[(W_T^2 - T)/2] = (T - T)/2 = 0.
        programs: ["princeton-mfin", "baruch-mfe"]

      - question: "What is Ito's isometry? State and explain its significance."
        difficulty: medium
        topics: ["ito_integral", "isometry"]
        hint: "It relates the expectation of the squared Ito integral to an ordinary Lebesgue integral."
        solution: |
          Ito's isometry: E[(integral_0^T f(t) dW_t)^2] = integral_0^T E[f(t)^2] dt.
          This means the L2-norm of an Ito integral equals the L2-norm of the integrand in
          ordinary Lebesgue sense. It is fundamental for defining the Ito integral for general
          adapted processes and for computing variances of stochastic integrals.
        programs: ["cmu-mscf", "princeton-mfin"]

      - question: "What is the Feynman-Kac theorem? How does it connect PDEs and stochastic processes?"
        difficulty: hard
        topics: ["feynman_kac", "pde", "conditional_expectation"]
        hint: "It says the solution to certain PDEs can be written as a conditional expectation of a stochastic process."
        solution: |
          The Feynman-Kac theorem states that the solution to the PDE
          u_t + mu(x)*u_x + 0.5*sigma(x)^2*u_xx - r*u = 0, u(T,x) = g(x)
          is given by u(t,x) = E[e^{-r(T-t)} g(X_T) | X_t = x] where dX = mu*dt + sigma*dW.
          This links PDEs to expected values -- central to derivative pricing. Black-Scholes PDE
          is a special case: the option price equals the risk-neutral expected discounted payoff.
          Practical use: solve the PDE numerically (finite differences) or compute the expectation
          (Monte Carlo). The theorem justifies both approaches.
        programs: ["princeton-mfin", "cmu-mscf", "stanford-mcf"]

      - question: "What is the difference between the Ito and Stratonovich interpretations of SDEs?"
        difficulty: hard
        topics: ["ito", "stratonovich", "sde"]
        hint: "The difference lies in the evaluation point of the integrand. Ito uses the left endpoint; Stratonovich uses the midpoint."
        solution: |
          Ito integral: integrand evaluated at the left endpoint of each partition interval.
          Non-anticipative (adapted), but ordinary chain rule fails (need Ito's Lemma).
          Stratonovich integral: integrand evaluated at the midpoint. The ordinary chain rule
          holds, making it compatible with standard calculus. But the integrand is anticipative.
          Conversion: integral f(X) o dW = integral f(X) dW + (1/2) integral f'(X)*sigma dt.
          In finance: Ito is standard because it reflects the non-anticipative nature of trading
          (you cannot peek at future prices). Stratonovich appears in physics and when converting
          between continuous and discrete-time models.
        programs: ["baruch-mfe", "princeton-mfin"]

      - question: "Compute E[W_t * W_s] and Cov(W_t, W_s) for a standard Brownian motion, where s < t."
        difficulty: easy
        topics: ["brownian_motion", "covariance"]
        hint: "Write W_t = W_s + (W_t - W_s) and use independence of increments."
        solution: |
          E[W_t * W_s] = E[(W_s + (W_t - W_s)) * W_s] = E[W_s^2] + E[(W_t - W_s)] * E[W_s]
          = s + 0 = s. (Using independence of W_s and W_t - W_s.)
          Since E[W_t] = E[W_s] = 0: Cov(W_t, W_s) = E[W_t * W_s] - E[W_t]*E[W_s] = s.
          General formula: Cov(W_t, W_s) = min(t, s).
          This is a fundamental property of Brownian motion used extensively in derivative pricing
          and correlation modeling.
        programs: ["baruch-mfe", "cmu-mscf"]

      - question: "What is quadratic variation? Compute the quadratic variation of Brownian motion on [0, T]."
        difficulty: medium
        topics: ["quadratic_variation", "brownian_motion"]
        hint: "Quadratic variation is the limit of the sum of squared increments over a partition. For smooth functions it is zero."
        solution: |
          Quadratic variation: [X]_T = lim_{n->inf} sum_{i=1}^n (X_{t_i} - X_{t_{i-1}})^2
          over partitions {0 = t_0 < t_1 < ... < t_n = T} with mesh going to 0.
          For Brownian motion: [W]_T = T. This is the crucial property that makes stochastic
          calculus different from ordinary calculus: (dW)^2 = dt (not zero!).
          For smooth functions f(t): [f]_T = 0 (increments are O(dt), so squared increments
          sum to zero). For GBM: [ln S]_T = sigma^2 * T.
          Quadratic variation drives the extra term in Ito's Lemma.
        programs: ["cmu-mscf", "baruch-mfe"]

      - question: "Define a martingale. Give two examples of martingales and two examples of non-martingales."
        difficulty: easy
        topics: ["martingale", "conditional_expectation"]
        hint: "A martingale satisfies E[X_t | F_s] = X_s for all s < t. Think about Brownian motion and simple transformations."
        solution: |
          A stochastic process M_t is a martingale if E[M_t | F_s] = M_s for all s <= t
          (the best prediction of the future value is the current value).
          Martingales: (1) W_t (Brownian motion), (2) W_t^2 - t (compensated squared BM),
          (3) e^{sigma*W_t - sigma^2*t/2} (exponential martingale).
          Non-martingales: (1) W_t^2 (E[W_t^2 | F_s] = W_s^2 + (t-s) != W_s^2),
          (2) t (deterministic trend), (3) S_t under real-world measure (has drift mu != r).
          In finance: discounted asset prices are martingales under the risk-neutral measure.
          This is the foundation of risk-neutral pricing.
        programs: ["baruch-mfe", "cmu-mscf", "princeton-mfin"]

      - question: "Explain the Ornstein-Uhlenbeck process. Where is it used in finance?"
        difficulty: medium
        topics: ["ornstein_uhlenbeck", "mean_reversion", "sde"]
        hint: "It is the continuous-time analogue of a mean-reverting AR(1) process."
        solution: |
          The Ornstein-Uhlenbeck (OU) process is defined by dX_t = theta*(mu - X_t)*dt + sigma*dW_t
          where theta > 0 is the mean-reversion speed, mu is the long-run mean, sigma is volatility.
          Solution: X_t = mu + (X_0 - mu)*e^{-theta*t} + sigma * integral_0^t e^{-theta(t-s)} dW_s.
          Key properties: (1) Mean-reverting to mu, (2) Stationary distribution is N(mu, sigma^2/(2*theta)),
          (3) Autocorrelation decays exponentially: Corr(X_t, X_{t+s}) = e^{-theta*s}.
          Finance applications: (1) Interest rate models (Vasicek model), (2) Pairs trading
          (model the spread as OU), (3) Volatility modeling, (4) Commodity prices (mean-reverting
          to production costs). The half-life of mean reversion is ln(2)/theta.
        programs: ["baruch-mfe", "cmu-mscf", "princeton-mfin"]

      - question: "What is the martingale representation theorem? Why is it important for hedging?"
        difficulty: hard
        topics: ["martingale", "hedging", "completeness"]
        hint: "It says every martingale adapted to the Brownian filtration can be written as a stochastic integral."
        solution: |
          Martingale Representation Theorem: if M_t is a square-integrable martingale adapted
          to the Brownian filtration F_t^W, then there exists an adapted process phi_t such that
          M_t = M_0 + integral_0^t phi_s dW_s.
          Significance for hedging: in a complete market (one stock, one Brownian motion),
          every contingent claim can be replicated. The replicating portfolio holds phi_t shares
          of the stock at time t. This means every derivative can be perfectly hedged, and the
          unique no-arbitrage price is the risk-neutral expectation of the discounted payoff.
          Without this theorem, we cannot guarantee that hedging strategies exist. Market
          incompleteness (jumps, stochastic vol) breaks the theorem and requires choosing
          among multiple risk-neutral measures.
        programs: ["princeton-mfin", "stanford-mcf", "cmu-mscf"]

  - id: linear_algebra
    name: "Linear Algebra"
    questions:
      - question: "What is the geometric interpretation of eigenvalues and eigenvectors?"
        difficulty: easy
        topics: ["eigenvalues", "eigenvectors", "linear_transformations"]
        hint: "Think about what happens when you apply a matrix to its eigenvector."
        solution: |
          Eigenvectors are directions that are preserved (only scaled) by the linear transformation.
          The eigenvalue is the scaling factor along that direction. If lambda > 1, the vector is
          stretched; if 0 < lambda < 1, compressed; if lambda < 0, reversed. A matrix with distinct
          eigenvalues can be understood as stretching/compressing along its eigenvector directions.
        programs: ["baruch-mfe", "cmu-mscf"]

      - question: "When is a matrix diagonalizable? Give a necessary and sufficient condition."
        difficulty: medium
        topics: ["diagonalization", "eigenvalues"]
        hint: "Think about the relationship between algebraic and geometric multiplicities."
        solution: |
          An n x n matrix is diagonalizable iff it has n linearly independent eigenvectors, or
          equivalently, iff the geometric multiplicity equals the algebraic multiplicity for every
          eigenvalue. Sufficient conditions: (1) n distinct eigenvalues, (2) the matrix is symmetric
          (real) or Hermitian (complex) -- spectral theorem guarantees orthogonal diagonalization.
        programs: ["cmu-mscf", "columbia-msfe"]

      - question: "Explain the Singular Value Decomposition (SVD) and its applications in finance."
        difficulty: hard
        topics: ["svd", "matrix_decomposition", "pca"]
        hint: "SVD decomposes any matrix into rotation, scaling, rotation. Think PCA."
        solution: |
          Any m x n matrix A = U * Sigma * V^T where U (m x m) and V (n x n) are orthogonal,
          Sigma is diagonal with non-negative singular values. Applications in finance:
          (1) PCA on covariance matrices for factor models and risk decomposition,
          (2) Dimensionality reduction of large return matrices,
          (3) Noise reduction in correlation estimation,
          (4) Solving ill-conditioned least-squares problems in regression.
        programs: ["baruch-mfe", "princeton-mfin", "cmu-mscf"]

      - question: "Prove that a real symmetric matrix has only real eigenvalues."
        difficulty: medium
        topics: ["symmetric_matrices", "eigenvalues", "proof"]
        hint: "Take the conjugate transpose of Av = lambda*v and use A = A^T."
        solution: |
          Let Av = lambda*v (v != 0). Take conjugate transpose: v^*A^T = conj(lambda)*v^*.
          Since A is real symmetric (A = A^T): v^*A = conj(lambda)*v^*.
          Multiply Av = lambda*v on the left by v^*: v^*Av = lambda*(v^*v).
          Multiply v^*A = conj(lambda)*v^* on the right by v: v^*Av = conj(lambda)*(v^*v).
          Since v^*v > 0: lambda = conj(lambda), so lambda is real.
        programs: ["princeton-mfin", "mit-mfin"]

      - question: "What is the Cholesky decomposition and why is it used in Monte Carlo simulation?"
        difficulty: medium
        topics: ["cholesky", "monte_carlo", "correlation"]
        hint: "It decomposes a positive definite matrix into L*L^T. Think about generating correlated normals."
        solution: |
          Cholesky decomposition: a symmetric positive definite matrix A = L*L^T where L is lower
          triangular. In Monte Carlo, to generate correlated normal random variables with covariance
          matrix Sigma, compute L = cholesky(Sigma), then X = L*Z where Z ~ N(0,I). The result
          X has Cov(X) = L*I*L^T = Sigma. This is more efficient than eigendecomposition and
          numerically stable for well-conditioned matrices.
        programs: ["baruch-mfe", "cmu-mscf", "berkeley-mfe"]

      - question: "What is the rank of a matrix and why does it matter in regression?"
        difficulty: easy
        topics: ["rank", "regression", "multicollinearity"]
        hint: "Rank equals the number of linearly independent columns. What happens when X^T X is not full rank?"
        solution: |
          Rank is the dimension of the column space (= row space). In regression Y = X*beta + eps,
          the OLS solution beta = (X^T X)^{-1} X^T Y requires X^T X to be invertible, which needs
          X to have full column rank. If rank(X) < p (multicollinearity), X^T X is singular:
          infinitely many solutions exist, estimates are unstable. Remedies include ridge regression,
          dropping variables, or PCA.
        programs: ["columbia-msfe", "nyu-tandon-mfe"]

      - question: "What are positive definite matrices? Give three equivalent characterizations."
        difficulty: medium
        topics: ["positive_definite", "eigenvalues", "cholesky"]
        hint: "Think about the quadratic form, eigenvalues, and factorizations."
        solution: |
          A symmetric matrix A is positive definite iff any of:
          (1) x^T A x > 0 for all x != 0 (quadratic form definition),
          (2) All eigenvalues of A are strictly positive,
          (3) A has a Cholesky decomposition A = L L^T with L lower triangular and positive diagonal,
          (4) All leading principal minors are positive (Sylvester's criterion),
          (5) A = B^T B for some full-rank matrix B.
          Covariance matrices are always positive semi-definite; strictly PD when no perfect collinearity.
        programs: ["baruch-mfe", "cmu-mscf"]

      - question: "What is the condition number of a matrix? Why does it matter for numerical computations?"
        difficulty: medium
        topics: ["condition_number", "numerical_stability"]
        hint: "Condition number = ratio of largest to smallest singular value. Think about amplification of errors."
        solution: |
          Condition number kappa(A) = ||A|| * ||A^{-1}|| = sigma_max / sigma_min (for 2-norm).
          It measures how much errors in input (b in Ax=b) are amplified in the output (x).
          If kappa(A) ~ 10^k, you lose about k digits of accuracy in the solution.
          Large condition number (ill-conditioned): small perturbations in b cause large changes
          in x. Common in finance: correlation matrices estimated from short time series.
          Remedies: (1) Regularization (add lambda*I to the matrix), (2) SVD truncation
          (discard small singular values), (3) Better conditioning via preprocessing.
          Rule of thumb: kappa > 10^6 means serious numerical issues in double precision.
        programs: ["cmu-mscf", "berkeley-mfe"]

      - question: "Explain the QR decomposition and its use in least squares regression."
        difficulty: medium
        topics: ["qr_decomposition", "regression", "numerical_methods"]
        hint: "QR decomposes A into an orthogonal Q and upper triangular R. How does this simplify solving Ax = b?"
        solution: |
          QR decomposition: A = Q*R where Q is orthogonal (Q^T Q = I) and R is upper triangular.
          For least squares (Ax ~ b): the normal equations A^T A x = A^T b become
          R^T Q^T Q R x = R^T Q^T b, so R x = Q^T b (upper triangular system, solved by
          back-substitution in O(n^2)).
          Advantages over normal equations (A^T A x = A^T b solved directly):
          (1) Numerically more stable -- kappa(A^T A) = kappa(A)^2, but QR works with kappa(A).
          (2) Avoids forming A^T A explicitly (less roundoff error).
          QR is the standard method for regression in production numerical libraries (LAPACK, numpy).
        programs: ["cmu-mscf", "baruch-mfe"]

      - question: "What is the spectral theorem? State it for real symmetric matrices."
        difficulty: medium
        topics: ["spectral_theorem", "eigendecomposition", "symmetric_matrices"]
        hint: "Real symmetric matrices have a very nice eigendecomposition. Think about orthogonality."
        solution: |
          Spectral theorem (real symmetric case): every real symmetric matrix A can be written as
          A = Q * Lambda * Q^T where Q is orthogonal (columns are orthonormal eigenvectors) and
          Lambda is diagonal (eigenvalues are real).
          Key consequences: (1) Real symmetric matrices are always diagonalizable,
          (2) Eigenvectors corresponding to distinct eigenvalues are orthogonal,
          (3) A = sum_{i=1}^n lambda_i * q_i * q_i^T (outer product form),
          (4) A is PD iff all eigenvalues are positive.
          In finance: covariance matrices are real symmetric PSD, so the spectral theorem
          guarantees PCA works. The eigenvalues give variance explained by each principal component.
        programs: ["princeton-mfin", "cmu-mscf"]

      - question: "How do you solve a system of linear equations Ax = b efficiently? Compare direct and iterative methods."
        difficulty: medium
        topics: ["linear_systems", "numerical_methods"]
        hint: "Direct methods: exact in finite steps. Iterative methods: converge to the solution. Think about when each is preferred."
        solution: |
          Direct methods: (1) Gaussian elimination / LU decomposition: O(n^3), exact up to
          roundoff. Standard for dense systems up to ~10,000 equations. (2) Cholesky (for SPD
          matrices): ~n^3/6, twice as fast as LU.
          Iterative methods: (1) Conjugate gradient (for SPD): converges in at most n steps,
          but often much fewer with preconditioning. O(n) per iteration. (2) GMRES (general):
          for non-symmetric systems.
          Choose direct for small/medium dense systems. Choose iterative for large sparse systems
          (PDEs, network problems). In quant finance: PDE solvers for option pricing use sparse
          systems (tridiagonal from finite differences) -- solved in O(n) by Thomas algorithm.
        programs: ["baruch-mfe", "cmu-mscf"]

      - question: "What is the trace of a matrix? State three properties of the trace."
        difficulty: easy
        topics: ["trace", "matrix_properties"]
        hint: "The trace is the sum of diagonal elements. Think about eigenvalues and cyclic permutations."
        solution: |
          Trace: tr(A) = sum of diagonal elements a_{ii}.
          Properties: (1) tr(A) = sum of eigenvalues (algebraic counting).
          (2) Cyclic property: tr(ABC) = tr(BCA) = tr(CAB). This does NOT mean tr(AB) = tr(BA)
          is obvious -- it follows from the cyclic property with C = I. But tr(ABC) != tr(ACB)
          in general.
          (3) tr(A + B) = tr(A) + tr(B) and tr(cA) = c*tr(A) (linearity).
          (4) tr(A^T) = tr(A).
          In finance: tr(Sigma) = total variance of a portfolio's components. The trace of the
          correlation matrix equals the number of assets (each diagonal element is 1).
        programs: ["baruch-mfe", "nyu-tandon-mfe"]

  - id: programming
    name: "Programming & Algorithms"
    questions:
      - question: "Implement a function to price a European call option using Monte Carlo simulation in Python."
        difficulty: medium
        topics: ["monte_carlo", "option_pricing", "python"]
        hint: "Simulate GBM paths, compute payoffs, discount back. Use numpy for vectorization."
        solution: |
          import numpy as np
          def mc_european_call(S0, K, T, r, sigma, n_sims=100000):
              Z = np.random.standard_normal(n_sims)
              ST = S0 * np.exp((r - 0.5*sigma**2)*T + sigma*np.sqrt(T)*Z)
              payoffs = np.maximum(ST - K, 0)
              return np.exp(-r*T) * np.mean(payoffs)
          Key: use risk-neutral drift r (not mu), vectorize with numpy, discount at risk-free rate.
        programs: ["baruch-mfe", "cmu-mscf", "berkeley-mfe"]

      - question: "What is the difference between a pointer and a reference in C++?"
        difficulty: easy
        topics: ["cpp", "pointers", "references"]
        hint: "Think about nullability, reassignment, and syntax."
        solution: |
          Pointers: can be null, can be reassigned, use * to dereference, support arithmetic.
          References: must be initialized, cannot be null, cannot be reseated, use like the original
          variable (syntactic alias). References are implemented as const pointers internally.
          In quant finance C++: prefer references for function parameters (safety), pointers for
          optional parameters and polymorphism (can be nullptr).
        programs: ["baruch-mfe", "cmu-mscf"]

      - question: "Explain the time complexity of building a heap vs inserting n elements one by one."
        difficulty: medium
        topics: ["heap", "complexity", "algorithms"]
        hint: "Heapify (bottom-up) is O(n), but n individual insertions are O(n log n). Why?"
        solution: |
          Bottom-up heapify (Floyd's algorithm): O(n). Most nodes are near the leaves and sift
          down a small distance. Sum = n/4*1 + n/8*2 + n/16*3 + ... = O(n).
          Repeated insertion: each insert is O(log n), so n inserts = O(n log n).
          The difference matters for quant systems processing large datasets: always prefer
          heapq.heapify() over repeated heappush() in Python.
        programs: ["cmu-mscf", "baruch-mfe"]

      - question: "Implement a function to compute the moving average of a time series in O(n) time."
        difficulty: easy
        topics: ["sliding_window", "time_series", "python"]
        hint: "Use a running sum: add the new element, subtract the old one."
        solution: |
          def moving_average(prices, window):
              result = []
              window_sum = sum(prices[:window])
              result.append(window_sum / window)
              for i in range(window, len(prices)):
                  window_sum += prices[i] - prices[i - window]
                  result.append(window_sum / window)
              return result
          O(n) time, O(1) extra space (excluding output). Avoids recomputing the sum each step.
        programs: ["baruch-mfe", "columbia-msfe"]

      - question: "What is the difference between virtual and non-virtual functions in C++? When do you use each?"
        difficulty: medium
        topics: ["cpp", "polymorphism", "vtable"]
        hint: "Virtual functions enable runtime polymorphism via the vtable. Consider the performance cost."
        solution: |
          Non-virtual: resolved at compile time (static dispatch). Fast, no overhead.
          Virtual: resolved at runtime via vtable lookup (dynamic dispatch). Slight overhead
          (~indirect function call). Use virtual when you need polymorphism (base class pointer
          calling derived class method). Use non-virtual for performance-critical code (pricing
          engines, hot loops). Pure virtual (= 0) makes the class abstract. In quant: instrument
          hierarchies use virtual; numerical kernels avoid it.
        programs: ["baruch-mfe", "cmu-mscf"]

      - question: "How would you design a data structure to efficiently compute the median of a stream of numbers?"
        difficulty: hard
        topics: ["data_structures", "heap", "streaming"]
        hint: "Use two heaps: a max-heap for the lower half and a min-heap for the upper half."
        solution: |
          Maintain a max-heap (lower half) and min-heap (upper half). For each new number:
          1. If <= max of lower heap, insert into lower; else insert into upper.
          2. Rebalance so sizes differ by at most 1.
          3. Median is top of larger heap (odd n) or average of both tops (even n).
          Insert: O(log n), Query median: O(1). This is useful in real-time risk monitoring
          and order book analysis where robust statistics (median) are preferred over mean.
        programs: ["cmu-mscf", "uchicago-msfm"]

      - question: "Explain the GIL in Python. How does it affect quant applications?"
        difficulty: medium
        topics: ["python", "concurrency", "performance"]
        hint: "The GIL prevents true parallel execution of Python threads. Think about workarounds."
        solution: |
          The Global Interpreter Lock (GIL) ensures only one thread executes Python bytecode at a
          time, even on multi-core systems. Impact on quant work: CPU-bound tasks (Monte Carlo,
          optimization) don't benefit from threading. Workarounds:
          (1) multiprocessing (separate processes, no shared GIL),
          (2) numpy/scipy release the GIL during C-level computation,
          (3) Use C++ extensions (pybind11) for hot loops,
          (4) asyncio for I/O-bound tasks (market data feeds).
        programs: ["baruch-mfe", "berkeley-mfe"]

      - question: "Design and implement an LRU (Least Recently Used) cache with O(1) get and put operations."
        difficulty: hard
        topics: ["data_structures", "design", "python"]
        hint: "Combine a hash map with a doubly linked list. Python's OrderedDict can also work."
        solution: |
          Use a hash map (dict) for O(1) key lookup and a doubly linked list for O(1)
          eviction order. On get: move node to front of list. On put: if full, evict the
          tail (LRU item). In Python, use collections.OrderedDict:
          class LRUCache:
              def __init__(self, capacity):
                  self.cache = OrderedDict()
                  self.cap = capacity
              def get(self, key):
                  if key not in self.cache: return -1
                  self.cache.move_to_end(key)
                  return self.cache[key]
              def put(self, key, val):
                  if key in self.cache: self.cache.move_to_end(key)
                  self.cache[key] = val
                  if len(self.cache) > self.cap: self.cache.popitem(last=False)
          Applications: caching market data lookups, memoizing pricing calculations.
        programs: ["cmu-mscf", "baruch-mfe"]

      - question: "Implement a thread-safe producer-consumer queue in C++ using mutexes and condition variables."
        difficulty: hard
        topics: ["cpp", "concurrency", "data_structures"]
        hint: "Use std::mutex, std::condition_variable, and std::queue. Think about when to notify."
        solution: |
          template<typename T>
          class ThreadSafeQueue {
              std::queue<T> q;
              std::mutex mtx;
              std::condition_variable cv;
          public:
              void push(T val) {
                  std::lock_guard<std::mutex> lock(mtx);
                  q.push(std::move(val));
                  cv.notify_one();
              }
              T pop() {
                  std::unique_lock<std::mutex> lock(mtx);
                  cv.wait(lock, [this]{ return !q.empty(); });
                  T val = std::move(q.front());
                  q.pop();
                  return val;
              }
          };
          Key patterns: RAII locking, condition variable wait with predicate to avoid
          spurious wakeups. Used in market data pipelines and order management systems.
        programs: ["baruch-mfe", "cmu-mscf"]

      - question: "Write a Python generator to compute a rolling standard deviation over a stream of prices without storing all past values."
        difficulty: medium
        topics: ["python", "generators", "streaming", "statistics"]
        hint: "Use Welford's online algorithm: maintain running count, mean, and M2."
        solution: |
          def rolling_std(window):
              from collections import deque
              import math
              buf = deque(maxlen=window)
              s = 0.0   # sum
              sq = 0.0  # sum of squares
              while True:
                  x = yield (math.sqrt((sq - s*s/len(buf)) / len(buf))
                             if len(buf) == window else None)
                  if len(buf) == window:
                      old = buf[0]
                      s -= old; sq -= old*old
                  buf.append(x)
                  s += x; sq += x*x
          Generators are ideal for streaming financial data: they maintain state across
          calls without holding the full history in memory.
        programs: ["baruch-mfe", "berkeley-mfe"]

      - question: "Implement a binomial tree pricer for an American put option using dynamic programming."
        difficulty: hard
        topics: ["dynamic_programming", "option_pricing", "python"]
        hint: "Build the stock price tree forward, then work backward comparing exercise vs continuation value."
        solution: |
          import numpy as np
          def american_put_binomial(S0, K, T, r, sigma, N):
              dt = T / N
              u = np.exp(sigma * np.sqrt(dt))
              d = 1 / u
              p = (np.exp(r * dt) - d) / (u - d)
              # Terminal stock prices
              ST = S0 * u ** np.arange(N, -1, -1) * d ** np.arange(0, N+1)
              V = np.maximum(K - ST, 0)  # payoff at maturity
              # Work backward
              for i in range(N-1, -1, -1):
                  Si = S0 * u ** np.arange(i, -1, -1) * d ** np.arange(0, i+1)
                  V = np.exp(-r*dt) * (p * V[:-1] + (1-p) * V[1:])
                  V = np.maximum(V, K - Si)  # early exercise check
              return V[0]
          Key: the American feature requires comparing exercise value at every node.
        programs: ["baruch-mfe", "cmu-mscf", "princeton-mfin"]

      - question: "Explain the difference between stack and heap memory allocation in C++. Why does it matter for low-latency systems?"
        difficulty: medium
        topics: ["cpp", "memory_management", "performance"]
        hint: "Stack allocation is deterministic and fast. Heap allocation involves system calls and can cause fragmentation."
        solution: |
          Stack: automatic, LIFO, very fast (just a pointer adjustment), fixed size per thread
          (typically 1-8 MB), deallocated automatically when scope ends.
          Heap: dynamic, managed by malloc/new, slower (system calls, fragmentation, locking in
          multi-threaded code), must be explicitly freed (or use smart pointers).
          For low-latency trading: (1) Prefer stack-allocated objects in hot paths,
          (2) Pre-allocate heap memory at startup, (3) Use custom allocators (arena/pool) to
          avoid malloc in critical sections, (4) Avoid std::string and std::vector reallocations
          in tight loops -- reserve capacity upfront. Deterministic latency requires eliminating
          allocator unpredictability.
        programs: ["baruch-mfe", "cmu-mscf"]

      - question: "Implement a function to check if a binary tree is a valid Binary Search Tree (BST)."
        difficulty: medium
        topics: ["data_structures", "binary_tree", "recursion"]
        hint: "A valid BST requires every node to satisfy constraints from all ancestors, not just its parent."
        solution: |
          def is_valid_bst(node, min_val=float('-inf'), max_val=float('inf')):
              if node is None:
                  return True
              if node.val <= min_val or node.val >= max_val:
                  return False
              return (is_valid_bst(node.left, min_val, node.val) and
                      is_valid_bst(node.right, node.val, max_val))
          Key insight: checking only parent-child relationships is insufficient. Each node must
          fall within a range defined by ALL its ancestors. The recursive approach passes these
          bounds down the tree. Time: O(n), Space: O(h) where h is tree height.
          Common mistake: only checking if left < parent < right at each node.
        programs: ["cmu-mscf", "baruch-mfe"]

      - question: "What is the difference between a process and a thread? Why does this matter for quantitative systems?"
        difficulty: easy
        topics: ["operating_systems", "concurrency"]
        hint: "Processes have separate memory spaces; threads share memory within a process."
        solution: |
          Process: independent execution unit with its own memory space, file descriptors, and
          resources. Inter-process communication (IPC) requires explicit mechanisms (pipes,
          shared memory, sockets). Higher overhead to create/switch.
          Thread: lightweight execution unit within a process. Shares memory, heap, and global
          variables with other threads. Lower overhead but requires synchronization (mutexes,
          locks) to avoid data races.
          In quant systems: (1) Use threads for shared-memory parallelism (e.g., market data
          feed updating a shared order book), (2) Use processes for isolation (e.g., separate
          pricing engines that should not crash each other), (3) In Python, multiprocessing
          bypasses the GIL for CPU-bound tasks. (4) Low-latency systems use lock-free data
          structures and CPU affinity to minimize thread scheduling latency.
        programs: ["baruch-mfe", "cmu-mscf"]

      - question: "Explain hash tables. What is the expected and worst-case time complexity for operations?"
        difficulty: easy
        topics: ["data_structures", "hash_table"]
        hint: "Hash tables use a hash function to map keys to array indices. Think about collisions."
        solution: |
          Hash table: array + hash function. For key k, compute index = hash(k) % table_size.
          Store the (key, value) pair at that index.
          Expected time: O(1) for insert, lookup, and delete (assuming good hash function
          and reasonable load factor).
          Worst case: O(n) when all keys hash to the same index (collision chain).
          Collision resolution: (1) Chaining -- each bucket is a linked list of colliding entries,
          (2) Open addressing -- probe for the next empty slot (linear, quadratic, double hashing).
          Load factor = n/table_size. Resize (rehash) when load factor exceeds threshold (~0.75).
          In finance: used for O(1) symbol lookups, order ID mapping, and caching computed
          values. Python dicts and C++ unordered_map are hash table implementations.
        programs: ["baruch-mfe", "cmu-mscf", "nyu-tandon-mfe"]

  - id: brainteasers
    name: "Brainteasers"
    questions:
      - question: "You have 12 balls, one is either heavier or lighter. You have a balance scale and 3 weighings. Find the odd ball and whether it's heavier or lighter."
        difficulty: hard
        topics: ["logic", "information_theory"]
        hint: "Each weighing has 3 outcomes (left heavy, right heavy, balanced). 3 weighings give 3^3 = 27 outcomes. You need to distinguish 24 cases (12 balls x 2 possibilities)."
        solution: |
          Label balls 1-12. Weighing 1: {1,2,3,4} vs {5,6,7,8}.
          Case A (balanced): odd ball is in {9,10,11,12}. Weigh {9,10,11} vs {1,2,3}.
            If balanced: ball 12 is odd, weigh against any to find heavy/light.
            If not balanced: you know heavy/light direction, one more weighing identifies which.
          Case B (not balanced): you know {9,10,11,12} are normal. Use them as references
            in the remaining 2 weighings, strategically swapping balls to isolate the odd one.
        programs: ["baruch-mfe", "uchicago-msfm"]

      - question: "You are in a dark room with a deck of 52 cards. 13 are face up, 39 face down. You can't see or feel which way they face. Split them into two piles so each pile has the same number of face-up cards."
        difficulty: medium
        topics: ["logic", "invariant"]
        hint: "You don't need to know which cards are face up. Think about what happens when you flip cards."
        solution: |
          Take any 13 cards and put them in a separate pile. Flip all 13 cards in that pile.
          If the 13 you took contained k face-up cards, the remaining pile has 13-k face-up cards.
          After flipping your pile of 13: it has 13-k face-up cards (the k that were face-up are
          now face-down, and the 13-k that were face-down are now face-up). Both piles have 13-k face-up cards.
        programs: ["baruch-mfe", "cmu-mscf"]

      - question: "How many trailing zeros does 100! have?"
        difficulty: easy
        topics: ["number_theory", "counting"]
        hint: "Trailing zeros come from factors of 10 = 2 x 5. Which factor is rarer?"
        solution: |
          Count factors of 5 in 100! (factors of 2 are more plentiful).
          floor(100/5) + floor(100/25) + floor(100/125) = 20 + 4 + 0 = 24 trailing zeros.
          Each multiple of 5 contributes one factor, multiples of 25 contribute an extra, etc.
        programs: ["baruch-mfe", "nyu-tandon-mfe"]

      - question: "Two trains are 100 miles apart heading toward each other, each at 50 mph. A fly starts on one train and flies at 75 mph back and forth between them until they collide. How far does the fly travel?"
        difficulty: easy
        topics: ["logic", "relative_velocity"]
        hint: "Don't track the fly's trips individually. How long until the trains collide?"
        solution: |
          The trains close the gap at 50 + 50 = 100 mph, so they collide in 1 hour.
          The fly travels for 1 hour at 75 mph = 75 miles. No need to sum an infinite series.
        programs: ["baruch-mfe", "uchicago-msfm"]

      - question: "You have two ropes that each take exactly 1 hour to burn, but burn at non-uniform rates. How do you measure exactly 45 minutes?"
        difficulty: medium
        topics: ["logic", "lateral_thinking"]
        hint: "You can light a rope from both ends. What does that give you?"
        solution: |
          Light rope A from both ends and rope B from one end simultaneously.
          Rope A burns out in 30 minutes (burning from both ends halves the time).
          At that moment, rope B has 30 minutes of burn left. Light rope B's other end.
          Rope B now burns out in 15 more minutes. Total elapsed: 30 + 15 = 45 minutes.
        programs: ["baruch-mfe", "nyu-tandon-mfe", "cmu-mscf"]

      - question: "Three ants are on three corners of an equilateral triangle. Each picks a random direction and walks along an edge. What is the probability no two ants collide?"
        difficulty: medium
        topics: ["combinatorics", "probability"]
        hint: "Ants don't collide only if they all walk in the same direction (all clockwise or all counterclockwise)."
        solution: |
          Each ant independently chooses one of 2 directions. Total outcomes: 2^3 = 8.
          No collision only if all go clockwise (1 way) or all go counterclockwise (1 way).
          P(no collision) = 2/8 = 1/4.
        programs: ["baruch-mfe", "mit-mfin"]

      - question: "You have a 3-gallon jug and a 5-gallon jug. How do you measure exactly 4 gallons?"
        difficulty: easy
        topics: ["logic", "modular_arithmetic"]
        hint: "Fill and pour between the jugs. Key operation: filling the 3-gallon into the 5-gallon."
        solution: |
          1. Fill the 5-gallon jug. (5, 0)
          2. Pour into 3-gallon jug. (2, 3)
          3. Empty the 3-gallon jug. (2, 0)
          4. Pour the 2 gallons into the 3-gallon jug. (0, 2)
          5. Fill the 5-gallon jug. (5, 2)
          6. Pour from 5-gallon into 3-gallon (which has room for 1). (4, 3)
          The 5-gallon jug now has exactly 4 gallons.
        programs: ["nyu-tandon-mfe", "cornell-mfe"]

      - question: "100 prisoners are lined up, each wearing a red or blue hat. Each can see the hats in front but not their own. Starting from the back, each must guess their hat color. They can strategize beforehand. At most how many can be saved with certainty?"
        difficulty: hard
        topics: ["logic", "parity", "strategy"]
        hint: "The last person can communicate one bit of information through their guess. Think about parity."
        solution: |
          99 can be saved with certainty (the last person has 50/50 odds).
          Strategy: the last person counts the number of red hats visible. If it is odd, they
          say 'red'; if even, they say 'blue'. They sacrifice themselves (50% chance).
          Each subsequent person counts the red hats they see, compares with the parity
          announced so far, and deduces their own hat color with certainty.
          This is a parity-based strategy: one bit of information (odd/even red count)
          allows all 99 remaining prisoners to deduce their own hat color.
        programs: ["baruch-mfe", "uchicago-msfm"]

      - question: "You have 10 bags of coins, each containing many coins. Nine bags have coins weighing 10g each; one bag has coins weighing 11g. You have a digital scale you can use exactly once. Identify the heavy bag."
        difficulty: medium
        topics: ["logic", "encoding"]
        hint: "Take different numbers of coins from each bag. The excess weight encodes the answer."
        solution: |
          Take 1 coin from bag 1, 2 from bag 2, ..., 10 from bag 10. Total coins: 55.
          If all weighed 10g, total = 550g. The actual weight is 550 + k grams, where bag k
          is the heavy bag (each of the k coins from that bag weighs 1g extra).
          Example: if weight = 553g, then bag 3 is heavy (3 extra grams).
          This encoding trick -- using different quantities to uniquely identify the source --
          is a fundamental principle in information theory and interview problems.
        programs: ["baruch-mfe", "cmu-mscf"]

      - question: "You are given two identical eggs and a 100-floor building. Find the highest floor from which an egg can be dropped without breaking, using the minimum worst-case number of drops."
        difficulty: hard
        topics: ["dynamic_programming", "optimization"]
        hint: "With 2 eggs, the optimal strategy uses roughly sqrt(200) ~ 14 drops. Think about the first drop floor."
        solution: |
          14 drops. Drop the first egg from floors 14, 27, 39, 50, 60, 69, 77, 84, 90, 95, 99, 100.
          If it breaks at floor k, use the second egg to sequentially check floors from
          the previous safe floor up to k-1 (at most 13 more drops).
          The strategy ensures total drops <= 14 in the worst case.
          Formula: with 2 eggs and n drops, we can check at most n*(n+1)/2 floors.
          Solve n*(n+1)/2 >= 100: n = 14 (14*15/2 = 105 >= 100).
          With k eggs and n drops: the answer involves binomial coefficients C(n,1)+C(n,2)+...+C(n,k).
        programs: ["baruch-mfe", "cmu-mscf", "uchicago-msfm"]

      - question: "A king puts 100 ants on a 1-meter stick. Each ant walks left or right at 1 cm/s. When two ants collide, they reverse direction. When an ant reaches the end, it falls off. How long until all ants fall off?"
        difficulty: medium
        topics: ["logic", "symmetry", "invariant"]
        hint: "When two ants collide and reverse direction, it is equivalent to them passing through each other."
        solution: |
          100 seconds. The key insight: when two ants collide and reverse direction, the effect
          is identical to them passing through each other (they are indistinguishable). So each
          ant effectively walks in a straight line to one end of the stick, regardless of collisions.
          The maximum time for any ant to reach an end is 1 meter / (1 cm/s) = 100 seconds.
          This problem tests whether you can find the right abstraction. The collision behavior
          is a red herring -- it does not change the individual ants' endpoints, only their identities.
        programs: ["baruch-mfe", "mit-mfin"]

      - question: "You have a 6x6 grid. How many rectangles (including squares) can be formed using the grid lines?"
        difficulty: medium
        topics: ["combinatorics", "counting"]
        hint: "A rectangle is determined by choosing 2 horizontal lines and 2 vertical lines from the grid."
        solution: |
          C(7,2) * C(7,2) = 21 * 21 = 441 rectangles.
          A 6x6 grid has 7 horizontal lines and 7 vertical lines. A rectangle is uniquely
          determined by choosing 2 of the 7 horizontal lines (top and bottom edges) and 2 of
          the 7 vertical lines (left and right edges).
          C(7,2) = 7!/(2!*5!) = 21. Total rectangles = 21 * 21 = 441.
          This includes all sizes: 1x1 (36), 1x2 (60), ..., 6x6 (1), etc.
          General formula for an m x n grid: C(m+1, 2) * C(n+1, 2).
        programs: ["nyu-tandon-mfe", "baruch-mfe"]

      - question: "You have an 8x8 chessboard with two opposite corners removed. Can you tile the remaining 62 squares with 31 dominoes (each covering exactly 2 squares)?"
        difficulty: medium
        topics: ["logic", "coloring_argument", "proof"]
        hint: "Color the board like a chessboard. What color are the two removed corners?"
        solution: |
          No, it is impossible. Color the board as a standard chessboard (alternating black
          and white). The two opposite corners are the same color (both white, say).
          Removing them leaves 30 white squares and 32 black squares.
          Each domino covers exactly one white and one black square.
          31 dominoes would cover 31 white and 31 black, but we have 30 white and 32 black.
          Contradiction. Therefore, the tiling is impossible.
          This is a beautiful example of a coloring/parity argument -- a powerful proof technique.
        programs: ["baruch-mfe", "mit-mfin"]

      - question: "Four people need to cross a bridge at night with one flashlight. They can cross at most two at a time, and they must carry the flashlight. Crossing times are 1, 2, 5, and 10 minutes. What is the minimum total crossing time?"
        difficulty: medium
        topics: ["optimization", "logic"]
        hint: "The naive approach (fastest person always brings back the flashlight) is not optimal. Consider having slower people cross together."
        solution: |
          17 minutes. The optimal strategy:
          1. Person 1 and 2 cross (2 min). Running total: 2.
          2. Person 1 returns (1 min). Running total: 3.
          3. Person 5 and 10 cross together (10 min). Running total: 13.
          4. Person 2 returns (2 min). Running total: 15.
          5. Person 1 and 2 cross (2 min). Running total: 17.
          The key insight: pair the two slowest people together so their crossing time counts
          only once (10 minutes instead of 10 + 5 = 15 minutes separately). The fast person (1)
          acts as the shuttle to bring back the flashlight cheaply.
        programs: ["baruch-mfe", "uchicago-msfm", "cmu-mscf"]

      - question: "If you roll a fair die repeatedly, what is the expected number of rolls until you see two consecutive sixes?"
        difficulty: hard
        topics: ["markov_chains", "expected_value"]
        hint: "Set up states: S0 (no recent six), S1 (last roll was a six), S2 (done). Write equations for expected rolls from each state."
        solution: |
          42 rolls. Define states: S0 = no recent six, S1 = last roll was 6, S2 = two consecutive sixes.
          E[S0] = 1 + (1/6)*E[S1] + (5/6)*E[S0]
          E[S1] = 1 + (1/6)*0 + (5/6)*E[S0]   (if six -> done, if not -> back to S0)
          From E[S1]: E[S0] = 6/5 * (E[S1] - 1) = 6/5 * (1 + 5/6 * E[S0] - 1) = E[S0]...
          Solving properly: From (2): E[S1] = 1 + (5/6)*E[S0].
          Substituting into (1): E[S0] = 1 + (1/6)(1 + 5/6 * E[S0]) + (5/6)*E[S0]
          E[S0] = 1 + 1/6 + 5/36 * E[S0] + 5/6 * E[S0] = 7/6 + 35/36 * E[S0].
          (1/36)*E[S0] = 7/6, so E[S0] = 42.
        programs: ["baruch-mfe", "cmu-mscf"]

  - id: finance
    name: "Finance & Markets"
    questions:
      - question: "Explain put-call parity and derive it from no-arbitrage."
        difficulty: medium
        topics: ["options", "no_arbitrage", "put_call_parity"]
        hint: "Compare the payoff of (call + K*e^{-rT}) versus (put + stock) at expiration."
        solution: |
          Put-call parity: C - P = S - K*e^{-rT} (European options, no dividends).
          Proof: Portfolio A = Call + K*e^{-rT} in cash. Portfolio B = Put + Stock.
          At expiry T: if S_T > K, A pays (S_T - K) + K = S_T, B pays 0 + S_T = S_T.
          If S_T <= K, A pays 0 + K = K, B pays (K - S_T) + S_T = K.
          A and B have identical payoffs in all states => same price today => C + K*e^{-rT} = P + S.
        programs: ["baruch-mfe", "cmu-mscf", "columbia-msfe"]

      - question: "What are the Greeks (Delta, Gamma, Theta, Vega, Rho)? How does a market maker use them?"
        difficulty: medium
        topics: ["greeks", "risk_management", "options"]
        hint: "Each Greek measures sensitivity to a specific risk factor. Market makers hedge by neutralizing Greeks."
        solution: |
          Delta: dV/dS (price sensitivity to underlying). Gamma: d^2V/dS^2 (delta sensitivity).
          Theta: dV/dt (time decay). Vega: dV/d(sigma) (vol sensitivity). Rho: dV/dr (rate sensitivity).
          Market makers: hedge Delta continuously (delta-neutral), monitor Gamma (convexity risk,
          especially near expiry/ATM), manage Theta (collect or pay time decay), and trade Vega
          (volatility views). A delta-neutral, gamma-positive portfolio profits from large moves
          but pays theta.
        programs: ["baruch-mfe", "cmu-mscf", "berkeley-mfe"]

      - question: "What is the difference between historical volatility and implied volatility?"
        difficulty: easy
        topics: ["volatility", "options", "statistics"]
        hint: "One is backward-looking (realized), the other is forward-looking (market-derived)."
        solution: |
          Historical (realized) volatility: annualized standard deviation of past log returns.
          Measured from data, backward-looking. Implied volatility: the sigma that, when plugged
          into Black-Scholes, produces the observed market price. Forward-looking, reflects market
          expectations. Key differences: IV includes risk premium, can differ across strikes
          (volatility smile/skew), and is generally higher than realized vol (variance risk premium).
        programs: ["baruch-mfe", "nyu-tandon-mfe"]

      - question: "Explain the concept of risk-neutral pricing. Why can we use it even though investors are risk-averse?"
        difficulty: hard
        topics: ["risk_neutral", "no_arbitrage", "fundamental_theorem"]
        hint: "It's not about investor preferences. It's about replication and no-arbitrage."
        solution: |
          Risk-neutral pricing says derivatives can be priced as discounted expected payoffs under
          the risk-neutral measure Q (where all assets earn the risk-free rate in expectation).
          This works because: (1) derivative payoffs can be replicated by trading the underlying,
          (2) the replicating portfolio's cost is preference-free (it works for any investor),
          (3) by the Fundamental Theorem of Asset Pricing, absence of arbitrage implies existence
          of an equivalent martingale measure Q. We don't assume risk-neutrality -- we exploit
          the fact that hedging eliminates risk, making preferences irrelevant for pricing.
        programs: ["princeton-mfin", "cmu-mscf", "stanford-mcf"]

      - question: "What is the volatility smile? What causes it?"
        difficulty: medium
        topics: ["volatility_smile", "options", "market_microstructure"]
        hint: "Plot implied vol vs strike. It's not flat as Black-Scholes assumes."
        solution: |
          The volatility smile is the pattern where implied volatility varies with strike price,
          typically U-shaped (smile) or downward-sloping (skew). Causes:
          (1) Fat tails in return distributions (Black-Scholes assumes normal, reality has excess kurtosis),
          (2) Jump risk -- crash risk makes OTM puts expensive (skew),
          (3) Supply/demand -- portfolio insurance creates put demand,
          (4) Leverage effect -- falling prices increase leverage and thus volatility,
          (5) Stochastic volatility -- vol itself is random (Heston, SABR models).
        programs: ["baruch-mfe", "cmu-mscf", "berkeley-mfe"]

      - question: "Explain duration and convexity for a bond. Why do we need both?"
        difficulty: medium
        topics: ["fixed_income", "duration", "convexity"]
        hint: "Duration is the first-order approximation; convexity is the second-order correction."
        solution: |
          Duration: (negative) weighted average time to cash flows. Measures bond price sensitivity
          to yield changes: dP/P ~ -D * dy (first-order).
          Convexity: measures the curvature of the price-yield relationship: dP/P ~ -D*dy + 0.5*C*(dy)^2.
          We need convexity because duration alone is a linear approximation -- it overestimates
          price drops and underestimates price gains. For large yield changes, the convexity term
          is significant. Higher convexity is desirable: it means the bond outperforms the linear
          estimate in both directions.
        programs: ["baruch-mfe", "columbia-msfe", "mit-mfin"]

      - question: "What is the difference between American and European options? When is early exercise optimal?"
        difficulty: easy
        topics: ["options", "early_exercise"]
        hint: "American options can be exercised early. Think about when the exercise value exceeds the continuation value."
        solution: |
          European: exercisable only at expiry. American: exercisable at any time up to expiry.
          American >= European in value (more rights). Early exercise is optimal for:
          (1) American puts on non-dividend stocks: when deep ITM, exercise to earn interest on K.
          (2) American calls on dividend-paying stocks: exercise just before ex-dividend date to
          capture the dividend.
          (3) Never optimal to exercise American calls on non-dividend stocks early (time value
          always positive). American options require different pricing methods (binomial trees,
          least-squares Monte Carlo, PDE with free boundary).
        programs: ["baruch-mfe", "nyu-tandon-mfe", "cmu-mscf"]

      - question: "You see a call option trading at $5 with Delta = 0.6. The stock moves up $2. Approximately what is the new option price?"
        difficulty: easy
        topics: ["greeks", "delta", "options"]
        hint: "Delta approximation: dC ~ Delta * dS. But remember Gamma for a better estimate."
        solution: |
          First-order approximation: new price ~ $5 + 0.6 * $2 = $6.20.
          If you also know Gamma (say Gamma = 0.05), the second-order approximation is:
          new price ~ $5 + 0.6*$2 + 0.5*0.05*$2^2 = $5 + $1.20 + $0.10 = $6.30.
          The Gamma correction matters more for larger moves and ATM options (where Gamma peaks).
        programs: ["baruch-mfe", "columbia-msfe"]

      - question: "What are the key assumptions of the Black-Scholes model? Which assumptions are most violated in practice?"
        difficulty: medium
        topics: ["black_scholes", "model_assumptions"]
        hint: "List the assumptions, then consider real-world market behavior."
        solution: |
          Assumptions: (1) Log-normal stock prices (GBM), (2) Constant volatility,
          (3) Constant risk-free rate, (4) No dividends, (5) No transaction costs or taxes,
          (6) Continuous trading possible, (7) No arbitrage, (8) European-style exercise only.
          Most violated: (a) Constant volatility -- real vol is stochastic and exhibits
          clustering (GARCH, Heston models), (b) Log-normal returns -- real returns have fat
          tails and negative skewness (crashes), (c) Continuous trading -- liquidity gaps, market
          closures, (d) No transaction costs -- bid-ask spread matters for hedging.
          Despite violations, BS remains the common language for quoting options (via implied vol).
        programs: ["baruch-mfe", "cmu-mscf", "berkeley-mfe"]

      - question: "Compare Monte Carlo simulation vs analytical pricing for options. When would you choose each?"
        difficulty: medium
        topics: ["monte_carlo", "option_pricing", "numerical_methods"]
        hint: "Think about dimensionality, path dependence, and convergence."
        solution: |
          Analytical (closed-form): fast, exact, but only available for simple payoffs
          (European vanilla via BS, some exotics). Limited to low dimensions.
          Monte Carlo: general-purpose, handles any payoff (path-dependent, multi-asset,
          early exercise via Longstaff-Schwartz). Convergence rate O(1/sqrt(N)) regardless
          of dimension -- scales well for baskets. But: slow for simple problems, requires
          variance reduction techniques (antithetic, control variate, importance sampling).
          Choose analytical when available; MC for path-dependent exotics (barriers, Asians,
          lookbacks), multi-asset options, and when the model itself is complex (stochastic
          vol, jumps). PDE/finite-difference methods are a third option for 1-3 dimensions.
        programs: ["cmu-mscf", "princeton-mfin", "baruch-mfe"]

      - question: "Explain delta hedging. What risks remain after delta hedging?"
        difficulty: medium
        topics: ["hedging", "greeks", "risk_management"]
        hint: "Delta hedging eliminates first-order price risk. But what about second-order and other risks?"
        solution: |
          Delta hedging: hold Delta shares of the underlying against an option position to
          eliminate first-order sensitivity to small price moves. Continuously rebalanced.
          Remaining risks after delta hedging:
          (1) Gamma risk -- large moves cause Delta to change; hedging error accumulates,
          (2) Vega risk -- changes in implied volatility affect option value,
          (3) Theta -- time decay (a known cost/benefit),
          (4) Discrete hedging -- in practice, you rebalance at intervals, not continuously,
          (5) Model risk -- if the underlying does not follow GBM (jumps, stochastic vol),
          (6) Transaction costs -- frequent rebalancing is expensive.
          A delta-hedged portfolio is primarily a bet on realized vs implied volatility.
        programs: ["baruch-mfe", "berkeley-mfe", "columbia-msfe"]

      - question: "What is market microstructure? Explain the bid-ask spread and its components."
        difficulty: medium
        topics: ["market_microstructure", "bid_ask_spread"]
        hint: "Think about why market makers quote a spread. Consider adverse selection, inventory, and order processing."
        solution: |
          Market microstructure studies how trading mechanisms affect price formation, liquidity,
          and transaction costs. The bid-ask spread has three components:
          (1) Adverse selection -- risk of trading with informed traders who know the true value.
              Wider spread compensates the market maker for losses to informed traders.
          (2) Inventory risk -- holding a position exposes the market maker to price risk.
              The spread compensates for carrying inventory.
          (3) Order processing costs -- operational costs of maintaining quotes and executing trades.
          In liquid markets (SPY), spreads are tight (1 cent). In illiquid markets (small-caps,
          OTC derivatives), spreads are wide. Understanding microstructure is crucial for
          execution algorithms (VWAP, TWAP) and optimal execution research.
        programs: ["uchicago-msfm", "nyu-tandon-mfe", "baruch-mfe"]

      - question: "What is pairs trading? Describe the basic statistical arbitrage strategy."
        difficulty: easy
        topics: ["pairs_trading", "statistical_arbitrage", "mean_reversion"]
        hint: "Find two correlated assets, model their spread, and trade when the spread deviates."
        solution: |
          Pairs trading: identify two historically correlated/cointegrated assets (e.g., Coca-Cola
          and Pepsi). Compute the spread = price_A - beta * price_B. When the spread deviates
          significantly from its mean (e.g., > 2 standard deviations):
          - Long the underperformer, short the outperformer.
          - Close when spread reverts to mean.
          Key statistical concepts: cointegration (not just correlation), stationarity of
          the spread, Ornstein-Uhlenbeck process modeling.
          Risks: (1) Spread may not revert (structural break), (2) Drawdowns during divergence,
          (3) Cointegration relationship can break down, (4) Crowded trade -- many quants use
          the same pairs. Modern variants use ML for pair selection and dynamic hedge ratios.
        programs: ["baruch-mfe", "cmu-mscf", "columbia-msfe"]

      - question: "What is Value at Risk (VaR)? What are its limitations?"
        difficulty: medium
        topics: ["risk_management", "var"]
        hint: "VaR answers: what is the worst loss at a given confidence level? Think about what it does NOT tell you."
        solution: |
          VaR: the maximum loss not exceeded with probability (1-alpha) over a given time horizon.
          Example: 1-day 95% VaR of $1M means there is a 5% chance of losing more than $1M in a day.
          Computation methods: (1) Historical simulation, (2) Parametric (variance-covariance),
          (3) Monte Carlo simulation.
          Limitations: (1) Does not measure the size of tail losses (only the threshold),
          (2) Not sub-additive -- VaR of a portfolio can exceed sum of component VaRs,
          (3) Assumes a specific distribution (often normal, but tails are fatter),
          (4) Backward-looking (historical data may not reflect future risks).
          CVaR (Expected Shortfall) addresses limitation (1) by averaging losses beyond VaR.
          CVaR is also coherent (sub-additive) and is now preferred by Basel III regulations.
        programs: ["baruch-mfe", "cmu-mscf", "columbia-msfe"]

      - question: "What is a yield curve? What information does its shape convey?"
        difficulty: easy
        topics: ["fixed_income", "yield_curve", "term_structure"]
        hint: "The yield curve plots bond yields vs maturity. Normal, inverted, and flat shapes each signal something."
        solution: |
          The yield curve plots interest rates (yields) of bonds with the same credit quality
          but different maturities (typically US Treasuries).
          Normal (upward sloping): longer maturities have higher yields. Reflects term premium
          (compensation for holding longer-duration bonds) and expectations of future rate increases.
          Inverted (downward sloping): short-term rates exceed long-term. Historically a reliable
          recession predictor (7 of last 7 US recessions were preceded by yield curve inversion).
          Flat: similar rates across maturities. Transitional, often signals uncertainty.
          Key rates: 2-year and 10-year Treasury. The 2s10s spread is the most watched indicator.
          Quantitative use: bootstrapping zero-coupon rates, pricing fixed income derivatives,
          and extracting market expectations for future interest rates.
        programs: ["baruch-mfe", "columbia-msfe", "mit-mfin"]

      - question: "What is the Sharpe ratio? What are its limitations and alternatives?"
        difficulty: easy
        topics: ["performance_measurement", "sharpe_ratio"]
        hint: "Sharpe = (return - risk_free) / std_dev. Think about what assumptions this makes."
        solution: |
          Sharpe ratio: SR = (R_p - R_f) / sigma_p. Measures excess return per unit of total risk.
          Higher is better. Benchmark: SR > 1 is good, > 2 is excellent, > 3 is exceptional.
          Limitations: (1) Assumes normal returns -- penalizes upside and downside equally,
          (2) Not meaningful for strategies with non-normal returns (options, trend-following),
          (3) Can be gamed by selling deep OTM options (collect premium, inflate SR until crash),
          (4) Time-period dependent and sensitive to the frequency of return measurement.
          Alternatives: (1) Sortino ratio -- uses downside deviation only,
          (2) Calmar ratio -- return / max drawdown (captures tail risk),
          (3) Information ratio -- excess return vs benchmark / tracking error,
          (4) Deflated Sharpe ratio -- adjusts for multiple testing.
        programs: ["baruch-mfe", "cmu-mscf", "berkeley-mfe"]

  - id: behavioral
    name: "Behavioral"
    questions:
      - question: "Why do you want to pursue an MFE degree? Why not a PhD or MBA?"
        difficulty: easy
        topics: ["motivation", "career_goals"]
        hint: "Be specific about the technical skills you want and the career path you envision. Show you understand what an MFE offers vs alternatives."
        solution: |
          Strong answer elements: (1) Specific technical skills you want (stochastic calc, ML for
          finance, C++ for low-latency systems), (2) Career goal alignment -- MFE targets
          quantitative roles directly vs. PhD (academic/research-focused, 4-6 years) vs. MBA
          (management/leadership, less technical), (3) Practical orientation -- you want to apply
          math to real markets, not just theory, (4) Timeline -- 1-1.5 year program fits your
          career trajectory, (5) Mention specific courses or faculty at the target program.
        programs: ["baruch-mfe", "cmu-mscf", "princeton-mfin", "mit-mfin", "berkeley-mfe"]

      - question: "Tell me about a time you worked on a challenging quantitative project."
        difficulty: easy
        topics: ["experience", "problem_solving"]
        hint: "Use the STAR format: Situation, Task, Action, Result. Emphasize the quantitative rigor."
        solution: |
          Structure your answer using STAR:
          Situation: Set the context (course project, internship, research).
          Task: What was the specific quantitative challenge?
          Action: What methods/tools did you use? (Be specific: optimization algorithm, statistical
          test, programming language, dataset size).
          Result: Quantify the outcome (improved accuracy by X%, reduced runtime by Y, published
          paper, won competition).
          Good topics: pricing model implementation, statistical arbitrage backtest, ML prediction
          model, risk system design.
        programs: ["baruch-mfe", "cmu-mscf", "princeton-mfin", "mit-mfin"]

      - question: "Where do you see yourself in 5 years after completing the MFE?"
        difficulty: easy
        topics: ["career_goals", "long_term_vision"]
        hint: "Show a clear, realistic career trajectory. Demonstrate you understand quant finance roles."
        solution: |
          Strong answer: Start with a specific entry role (quant researcher at a hedge fund, derivatives
          desk quant at a bank, systematic trading at a prop firm). Then describe progression
          (senior quant, portfolio manager, head of desk). Show awareness of the industry:
          mention specific firms, strategies, or market segments you find compelling.
          Avoid being too vague ("I want to be successful") or too rigid. Show intellectual
          curiosity and willingness to grow. Connect your background to the target role.
        programs: ["baruch-mfe", "cmu-mscf", "princeton-mfin", "mit-mfin"]

      - question: "What is your biggest weakness and how are you addressing it?"
        difficulty: easy
