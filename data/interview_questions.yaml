        hint: "Show you understand the different types of quant roles and where they sit in the financial ecosystem."
        solution: |
          Sell-side (banks): pricing and hedging derivatives, risk management models, XVA
          (credit, funding valuation adjustments). Focus on model validation and regulation.
          Buy-side (hedge funds, asset managers): alpha generation, systematic trading strategies,
          portfolio optimization, risk analytics. Focus on PnL and Sharpe ratio.
          Prop trading firms: market making, statistical arbitrage, ultra-low-latency systems.
          Focus on speed, execution, and technology.
          Fintech: quantitative modeling for lending, insurance, payment optimization.
          MFE graduates typically enter sell-side desk quant or buy-side quant researcher roles,
          with increasing movement toward systematic trading and fintech.
