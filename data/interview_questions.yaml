      - question: "Describe a situation where you had to learn a new technical skill quickly. How did you approach it?"
        difficulty: easy
        topics: ["learning_agility", "self_directed"]
        hint: "Show structured learning approach, resourcefulness, and measurable progress."
        solution: |
          Strong answer: (1) Context -- what skill and why was it urgent (internship requirement,
