          (online course, textbook, mentor, hands-on projects), (3) Milestones -- how you
          tracked progress (completed X chapters, built Y project, passed Z test),
          (4) Outcome -- how the skill was applied and the result achieved.
          MFE programs value learning agility because the curriculum is intense and broad.
          Show you can pick up C++, stochastic calculus, or a new framework efficiently.
