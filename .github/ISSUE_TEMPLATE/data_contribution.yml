name: Admission Data Contribution
description: Contribute your anonymized admission data to improve prediction accuracy
title: "[data] Anonymous admission contribution"
labels: ["data-contribution"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for contributing! Your data helps improve predictions for everyone.

        **How to submit:** Run `quantpath predict` and answer "y" when asked to contribute.
        Your data is auto-anonymized — no names, specific university names, or company names
        are included, only categories (e.g. "US T30", "top quant").

        **If you were redirected here from the CLI**, the form below should already be
        pre-filled. Just click **Submit new issue**.

        **Most valuable:** Please come back and update the "Actual Outcomes" section
        once you receive decisions. This is the #1 way to improve model accuracy.

  - type: textarea
    id: profile
    attributes:
      label: Anonymized Profile
      description: Auto-generated by `quantpath predict`
      placeholder: "Paste the output here (or it may be pre-filled via URL)"
    validations:
      required: true

  - type: textarea
    id: outcomes
    attributes:
      label: Actual Outcomes (update later)
      description: |
        Come back after decisions and fill in your results.
        Format: Program Name: accepted / rejected / waitlisted
      placeholder: |
        - Baruch MFE: pending
        - CMU MSCF: pending
        - Berkeley MFE: pending
    validations:
      required: false

  - type: input
    id: season
    attributes:
      label: Application Season
      placeholder: "e.g. Fall 2027"
    validations:
      required: false
